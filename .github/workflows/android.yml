name: Build Android App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Dependencies
      run: npm install

    - name: Create Web Directory and Move Files
      run: |
        mkdir www
        cp index.html www/

    - name: Initialize Capacitor Android
      run: |
        npx cap init "DX Stack" "com.dxstack.game" --web-dir=www
        npx cap add android

    - name: Sync Code to Android
      run: npx cap sync android

    - name: Build APK & AAB with Gradle
      run: |
        cd android
        ./gradlew assembleDebug
        ./gradlew bundleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DX-Stack-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Upload AAB Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DX-Stack-AAB
        path: android/app/build/outputs/bundle/debug/app-debug.aab
